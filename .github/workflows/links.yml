name: links

on:
  push:
    branches: [main]
  pull_request:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --max-redirects 5 --exclude-path tasks './**/*.md'
          fail: true
          failIfEmpty: false
